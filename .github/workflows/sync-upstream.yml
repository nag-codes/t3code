name: Sync main from upstream

# Schedules a daily sync of nag-codes/t3code:main from pingdotgg/t3code:main
# at 05:00 Asia/Bangkok (= 22:00 UTC).
#
# Uses the GitHub "merge-upstream" REST API (same endpoint as the "Sync fork"
# button) via `gh repo sync`. The API:
#   - fast-forwards when possible,
#   - creates a merge commit when fork main is only ahead of upstream/main,
#   - returns 409 Conflict on real code conflicts.
#
# Auth uses the SYNC_TOKEN secret — a fine-grained PAT with Contents and
# Workflows read/write on this repo — because the default GITHUB_TOKEN is
# blocked from merging upstream commits that touch .github/workflows/.
# PAT-authored pushes DO trigger push-event workflows, so "Rebase feat onto
# main" fires on its own whenever the sync moves main — no explicit dispatch.

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 05:00 ICT (Bangkok, UTC+7, no DST)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # all API calls use SYNC_TOKEN, not GITHUB_TOKEN

    steps:
      - name: Sync main with upstream/main
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            {
              echo "## ✗ SYNC_TOKEN secret is not configured"
              echo
              echo "Create a fine-grained PAT (Contents + Workflows read/write on"
              echo "nag-codes/t3code) and save it as the SYNC_TOKEN repository secret:"
              echo
              echo '```bash'
              echo 'gh secret set SYNC_TOKEN --repo nag-codes/t3code'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::SYNC_TOKEN secret is not configured"
            exit 1
          fi

          set +e
          output=$(gh repo sync nag-codes/t3code --branch main 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            {
              echo "## ✓ Synced main from upstream"
              echo
              echo '```'
              echo "$output"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ✗ Sync failed — manual resolution required"
              echo
              echo '```'
              echo "$output"
              echo '```'
              echo
              echo "Resolve locally:"
              echo
              echo '```bash'
              echo 'git fetch upstream'
              echo 'git checkout main'
              echo 'git merge upstream/main'
              echo 'git push origin main'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi
