name: Rebase feat onto main

# Triggered by:
#   - "Sync fork" button on github.com (pushes to main)
#   - direct pushes to main
#   - manual workflow_dispatch
#
# Note: pushes from inside this workflow use the default GITHUB_TOKEN and
# do NOT retrigger workflows — that's the anti-recursion guard.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout feat branch
        uses: actions/checkout@v4
        with:
          ref: feat/claude-bedrock-model-override
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase feat/claude-bedrock-model-override onto main
        run: |
          git fetch origin main

          if git rebase origin/main; then
            git push origin feat/claude-bedrock-model-override --force-with-lease
            {
              echo "## ✓ feat rebased cleanly onto main"
              echo
              echo "Both branches are now in sync with upstream."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | sed 's|^|- `|; s|$|`|')
            git rebase --abort || true
            {
              echo "## ✗ feat needs manual rebase"
              echo
              echo "main is current with upstream, but rebasing feat onto"
              echo "main produced conflicts. Resolve locally:"
              echo
              echo '```bash'
              echo "git checkout feat/claude-bedrock-model-override"
              echo "git pull --rebase=false   # refresh local feat from origin"
              echo "git rebase main"
              echo "# fix the files listed below, then:"
              echo "git rebase --continue"
              echo "git push origin feat/claude-bedrock-model-override --force-with-lease"
              echo '```'
              echo
              echo "### Conflicting files"
              echo "$CONFLICTS"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
